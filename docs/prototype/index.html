<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>VeloGarage</title>
  <meta name="description" content="Track your bikes. Know when to wrench." />

  <!-- PWA / iOS home-screen app -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VeloGarage" />
  <link rel="apple-touch-icon" href="icon.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --accent: #10A37F;
      --bg: #0d0d0d;
      --surface: #181818;
      --surface2: #222;
      --text: #f0f0f0;
      --muted: #8a8a8a;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --nav-h: 64px;
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    #app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* Top bar */
    .topbar {
      padding: calc(env(safe-area-inset-top) + 14px) 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1c1c1c;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar .title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .topbar .title span { color: var(--accent); }
    .sync {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
      background: var(--surface); border: 1px solid #2a2a2a;
      padding: 7px 12px; border-radius: 999px; cursor: pointer;
    }
    .sync .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .sync.spinning .dot { background: var(--amber); animation: pulse 0.8s infinite; }
    @keyframes pulse { 50% { opacity: 0.3; } }

    /* Scroll area */
    .screen { flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px); -webkit-overflow-scrolling: touch; }
    .screen-label { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin: 6px 4px 14px; }

    /* Bike cards */
    .bike-card {
      background: var(--surface); border: 1px solid #232323; border-radius: 18px;
      padding: 18px; margin-bottom: 14px; cursor: pointer; transition: transform .12s, border-color .2s;
      display: flex; align-items: center; gap: 16px;
    }
    .bike-card:active { transform: scale(0.985); }
    .bike-emoji { font-size: 34px; }
    .bike-info { flex: 1; min-width: 0; }
    .bike-name { font-size: 17px; font-weight: 700; }
    .bike-dist { color: var(--accent); font-size: 13px; font-weight: 600; margin-top: 2px; }
    .bike-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
    .badge.over { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.warn { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.good { background: rgba(34,197,94,0.15); color: var(--green); }
    .chev { color: #555; font-size: 22px; }

    /* Component rows */
    .comp { background: var(--surface); border: 1px solid #232323; border-radius: 16px; padding: 15px 16px; margin-bottom: 11px; }
    .comp-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
    .comp-label { font-size: 15px; font-weight: 600; }
    .comp-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .comp-status { font-size: 11px; font-weight: 700; white-space: nowrap; }
    .s-good { color: var(--green); } .s-warn { color: var(--amber); } .s-over { color: var(--red); }
    .bar-track { height: 7px; background: #2a2a2a; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease, background .3s; }
    .comp-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .comp-meta { font-size: 11px; color: #666; }
    .log-btn { font-size: 12px; font-weight: 700; color: var(--accent); background: rgba(16,163,127,0.12); border: none; padding: 7px 14px; border-radius: 999px; cursor: pointer; }
    .log-btn:active { opacity: 0.6; }

    /* Detail header */
    .detail-head { display: flex; align-items: center; gap: 12px; margin: 4px 4px 18px; }
    .back { font-size: 22px; color: var(--text); cursor: pointer; padding: 4px 6px; margin-left: -6px; }
    .detail-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .detail-dist { font-size: 13px; color: var(--accent); font-weight: 600; }

    /* Log feed */
    .log-item { display: flex; gap: 13px; padding: 13px 4px; border-bottom: 1px solid #1a1a1a; }
    .log-ic { width: 38px; height: 38px; border-radius: 11px; background: var(--surface); display: grid; place-items: center; font-size: 17px; flex-shrink: 0; }
    .log-main { flex: 1; }
    .log-title { font-size: 14px; font-weight: 600; }
    .log-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .log-when { font-size: 11px; color: #555; white-space: nowrap; }

    /* Settings */
    .set-card { background: var(--surface); border: 1px solid #232323; border-radius: 16px; padding: 16px; margin-bottom: 14px; }
    .set-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid #1e1e1e; font-size: 14px; }
    .set-row:last-child { border-bottom: none; }
    .set-row .v { color: var(--muted); }
    .strava-row { display: flex; align-items: center; gap: 12px; }
    .strava-av { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg,#10A37F,#0c7a5f); display: grid; place-items: center; font-weight: 800; }
    .pwa-tip { font-size: 12px; color: var(--muted); background: var(--surface); border: 1px dashed #2f2f2f; border-radius: 14px; padding: 14px; margin-top: 6px; line-height: 1.5; }

    /* Bottom nav */
    .nav {
      position: absolute; left: 0; right: 0; bottom: 0;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(18,18,18,0.95); backdrop-filter: blur(12px);
      border-top: 1px solid #232323;
      display: flex;
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--muted); cursor: pointer; font-size: 10px; font-weight: 600; }
    .nav-item .ic { font-size: 21px; line-height: 1; }
    .nav-item.active { color: var(--accent); }
    .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 60px 20px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="title">🚲 <span>Velo</span>Garage</div>
      <div class="sync" id="sync"><span class="dot"></span><span id="syncText">Synced 2h ago</span></div>
    </div>
    <div class="screen" id="screen"></div>
    <div class="nav" id="nav">
      <div class="nav-item active" data-tab="garage"><span class="ic">🏠</span>Garage</div>
      <div class="nav-item" data-tab="log"><span class="ic">📋</span>Log</div>
      <div class="nav-item" data-tab="settings"><span class="ic">⚙️</span>Settings</div>
    </div>
  </div>

  <script>
    const state = {
      tab: 'garage',
      bikeId: null,
      bikes: [
        { id: 'domane', name: 'Trek Domane SL6', emoji: '🚴', dist: 12480, components: [
          { id: 'c1', label: 'Chain', sub: 'Wax', mileage: 412, interval: 400 },
          { id: 'c2', label: 'Cassette', sub: '11-speed', mileage: 2800, interval: 8000 },
          { id: 'c3', label: 'Rear Tire', sub: 'GP5000', mileage: 2460, interval: 3000 },
          { id: 'c4', label: 'Front Tire', sub: 'GP5000', mileage: 1900, interval: 4000 },
          { id: 'c5', label: 'Brake Pads', sub: 'Front', mileage: 1650, interval: 2000 },
          { id: 'c6', label: 'Rotors', sub: 'Front', mileage: 4200, interval: 10000 },
        ]},
        { id: 'crux', name: 'Specialized Crux', emoji: '🚵', dist: 6200, components: [
          { id: 'g1', label: 'Chain', sub: 'Wet lube', mileage: 280, interval: 400 },
          { id: 'g2', label: 'Cassette', sub: '12-speed', mileage: 6200, interval: 8000 },
          { id: 'g3', label: 'Rear Tire', sub: 'Pathfinder', mileage: 900, interval: 3000 },
          { id: 'g4', label: 'Brake Pads', sub: 'Rear', mileage: 1950, interval: 2000 },
        ]},
      ],
      log: [
        { icon: '⛓️', title: 'Chain replaced', sub: 'Trek Domane SL6 · wax', when: '3 wk ago' },
        { icon: '🛞', title: 'Rear tire replaced', sub: 'Specialized Crux', when: '1 mo ago' },
        { icon: '🧽', title: 'Drivetrain cleaned', sub: 'Trek Domane SL6', when: '1 mo ago' },
      ],
    };

    const fmt = n => n.toLocaleString();
    function health(c) {
      const r = c.mileage / c.interval;
      if (r >= 1) return { cls: 's-over', bar: 'var(--red)', txt: '⚠ Overdue', badge: 'over', pct: Math.min(r,1)*100 };
      if (r >= 0.8) return { cls: 's-warn', bar: 'var(--amber)', txt: '⏱ Due soon', badge: 'warn', pct: r*100 };
      return { cls: 's-good', bar: 'var(--green)', txt: '✓ Good', badge: 'good', pct: r*100 };
    }
    function worstBadge(bike) {
      let worst = 'good';
      bike.components.forEach(c => { const b = health(c).badge; if (b==='over') worst='over'; else if (b==='warn'&&worst!=='over') worst='warn'; });
      const map = { over:['over','Service due'], warn:['warn','Due soon'], good:['good','All good'] };
      return map[worst];
    }

    const screen = document.getElementById('screen');

    function renderGarage() {
      screen.innerHTML = `<div class="screen-label">My Garage · ${state.bikes.length} bikes</div>` +
        state.bikes.map(b => {
          const [bc, bt] = worstBadge(b);
          return `<div class="bike-card" data-bike="${b.id}">
            <div class="bike-emoji">${b.emoji}</div>
            <div class="bike-info">
              <div class="bike-name">${b.name}</div>
              <div class="bike-dist">${fmt(b.dist)} km total</div>
              <div class="bike-meta">${b.components.length} components tracked</div>
            </div>
            <span class="badge ${bc}">${bt}</span>
            <span class="chev">›</span>
          </div>`;
        }).join('');
    }

    function renderBike() {
      const b = state.bikes.find(x => x.id === state.bikeId);
      screen.innerHTML = `
        <div class="detail-head">
          <div class="back" data-back>‹</div>
          <div><div class="detail-name">${b.name}</div><div class="detail-dist">${fmt(b.dist)} km total</div></div>
        </div>` +
        b.components.map(c => {
          const h = health(c);
          return `<div class="comp">
            <div class="comp-top">
              <div><div class="comp-label">${c.label}</div><div class="comp-sub">${c.sub}</div></div>
              <div class="comp-status ${h.cls}">${h.txt}</div>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.min(h.pct,100)}%;background:${h.bar}"></div></div>
            <div class="comp-foot">
              <div class="comp-meta">${fmt(c.mileage)} / ${fmt(c.interval)} km</div>
              <button class="log-btn" data-log="${c.id}">Log service</button>
            </div>
          </div>`;
        }).join('');
    }

    function renderLog() {
      screen.innerHTML = `<div class="screen-label">Maintenance Log</div>` +
        state.log.map(l => `<div class="log-item">
          <div class="log-ic">${l.icon}</div>
          <div class="log-main"><div class="log-title">${l.title}</div><div class="log-sub">${l.sub}</div></div>
          <div class="log-when">${l.when}</div>
        </div>`).join('');
    }

    function renderSettings() {
      screen.innerHTML = `<div class="screen-label">Settings</div>
        <div class="set-card">
          <div class="strava-row">
            <div class="strava-av">DR</div>
            <div style="flex:1"><div style="font-weight:600">Connected to Strava</div><div style="font-size:12px;color:var(--muted)">Daniel R. · last sync 2h ago</div></div>
            <span class="badge good">Active</span>
          </div>
        </div>
        <div class="set-card">
          <div class="set-row"><span>Default chain interval (wax)</span><span class="v">400 km</span></div>
          <div class="set-row"><span>Cassette</span><span class="v">8,000 km</span></div>
          <div class="set-row"><span>Tires (rear / front)</span><span class="v">3,000 / 4,000 km</span></div>
          <div class="set-row"><span>Brake pads</span><span class="v">2,000 km</span></div>
          <div class="set-row"><span>Units</span><span class="v">Kilometers</span></div>
        </div>
        <div class="pwa-tip">📲 This is a prototype running as a web app. On iPhone: tap the <b>Share</b> button → <b>Add to Home Screen</b> to install the icon and open it fullscreen, just like a native app.</div>`;
    }

    function render() {
      if (state.tab === 'garage') state.bikeId ? renderBike() : renderGarage();
      else if (state.tab === 'log') renderLog();
      else renderSettings();
      document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.tab === state.tab));
    }

    document.getElementById('nav').addEventListener('click', e => {
      const item = e.target.closest('.nav-item'); if (!item) return;
      state.tab = item.dataset.tab; state.bikeId = null; render();
    });

    screen.addEventListener('click', e => {
      const bike = e.target.closest('[data-bike]');
      if (bike) { state.bikeId = bike.dataset.bike; render(); return; }
      if (e.target.closest('[data-back]')) { state.bikeId = null; render(); return; }
      const log = e.target.closest('[data-log]');
      if (log) {
        const b = state.bikes.find(x => x.id === state.bikeId);
        const c = b.components.find(x => x.id === log.dataset.log);
        c.mileage = 0;
        state.log.unshift({ icon: '🔧', title: `${c.label} serviced`, sub: `${b.name} · ${c.sub}`, when: 'just now' });
        render();
      }
    });

    // Fake "sync"
    document.getElementById('sync').addEventListener('click', () => {
      const s = document.getElementById('sync'), t = document.getElementById('syncText');
      s.classList.add('spinning'); t.textContent = 'Syncing…';
      setTimeout(() => { s.classList.remove('spinning'); t.textContent = 'Synced just now'; }, 1100);
    });

    render();
  </script>
</body>
</html>
