<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VeloGarage</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VeloGarage" />
  <link rel="apple-touch-icon" href="icon.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --accent:#10A37F; --bg:#0d0d0d; --surface:#181818; --text:#f0f0f0; --muted:#8a8a8a; --strava:#FC4C02; }
    html, body { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    #app { min-height: 100dvh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

    /* Login */
    .login { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 26px; padding: 32px 24px; }
    .login .emoji { font-size: 68px; }
    .login h1 { font-size: 40px; font-weight: 900; letter-spacing: -1.5px; }
    .login h1 span { color: var(--accent); }
    .login .tag { color: var(--muted); font-size: 16px; max-width: 300px; line-height: 1.5; }
    .btn-strava { display: inline-flex; align-items: center; justify-content: center; background: var(--strava); color: #fff; font-size: 16px; font-weight: 700; padding: 15px 26px; border-radius: 12px; text-decoration: none; width: 100%; max-width: 320px; }
    .btn-strava:active { opacity: .85; }
    .fine { font-size: 12px; color: #555; max-width: 320px; line-height: 1.5; }
    .err { color: #ef4444; font-size: 13px; background: rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); padding:10px 14px; border-radius:10px; max-width:340px; }

    /* App shell */
    .topbar { padding: calc(env(safe-area-inset-top) + 14px) 18px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1c1c1c; position: sticky; top: 0; background: rgba(13,13,13,.92); backdrop-filter: blur(10px); z-index: 10; }
    .brand { font-size: 21px; font-weight: 800; letter-spacing: -.5px; }
    .brand span { color: var(--accent); }
    .top-right { display: flex; align-items: center; gap: 10px; }
    .sync { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); background: var(--surface); border: 1px solid #2a2a2a; padding: 7px 12px; border-radius: 999px; cursor: pointer; }
    .sync .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .sync.spin .dot { animation: pulse .8s infinite; }
    @keyframes pulse { 50% { opacity: .25; } }
    .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1.5px solid #2a2a2a; background: var(--surface); cursor: pointer; }

    .screen { flex: 1; overflow-y: auto; padding: 16px 16px calc(env(safe-area-inset-bottom) + 24px); }
    .screen-label { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin: 6px 4px 14px; }

    .bike-card { background: var(--surface); border: 1px solid #232323; border-radius: 18px; padding: 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: transform .12s; }
    .bike-card:active { transform: scale(.985); }
    .bike-emoji { font-size: 32px; }
    .bike-info { flex: 1; min-width: 0; }
    .bike-name { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bike-dist { color: var(--accent); font-size: 13px; font-weight: 600; margin-top: 2px; }
    .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: rgba(16,163,127,.15); color: var(--accent); }
    .chev { color: #555; font-size: 22px; }

    .detail-head { display: flex; align-items: center; gap: 10px; margin: 4px 2px 18px; }
    .back { font-size: 24px; color: var(--text); cursor: pointer; padding: 2px 6px; margin-left: -6px; }
    .detail-name { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
    .detail-dist { font-size: 13px; color: var(--accent); font-weight: 600; }
    .card { background: var(--surface); border: 1px solid #232323; border-radius: 16px; padding: 18px; }
    .card .soon { font-size: 14px; line-height: 1.6; } .card .soon b { color: var(--accent); }

    .state { text-align: center; color: var(--muted); padding: 56px 24px; font-size: 14px; line-height: 1.6; }
    .spinner { width: 26px; height: 26px; border: 3px solid #2a2a2a; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-ghost { background: var(--surface); border: 1px solid #2f2f2f; color: var(--text); font-size: 14px; font-weight: 600; padding: 10px 18px; border-radius: 10px; cursor: pointer; margin-top: 14px; }
    .link { color: var(--muted); font-size: 13px; text-decoration: underline; cursor: pointer; background: none; border: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API = "https://velogarage.onrender.com";
    const LS = "velogarage_auth";

    // ---- session ----
    const loadAuth = () => { try { return JSON.parse(localStorage.getItem(LS)); } catch { return null; } };
    const saveAuth = (a) => localStorage.setItem(LS, JSON.stringify(a));
    const clearAuth = () => localStorage.removeItem(LS);
    function fromHash() {
      if (!location.hash || location.hash.length < 2) return null;
      const p = new URLSearchParams(location.hash.slice(1));
      if (p.get("error")) return { error: p.get("error") };
      if (!p.get("access_token")) return null;
      return {
        access_token: p.get("access_token"), refresh_token: p.get("refresh_token"),
        expires_at: Number(p.get("expires_at")), athlete_id: p.get("athlete_id"),
        athlete_name: p.get("athlete_name"), athlete_photo: p.get("athlete_photo"),
      };
    }
    async function getToken() {
      let auth = loadAuth();
      if (!auth || !auth.access_token) return null;
      const now = Math.floor(Date.now() / 1000);
      if (auth.expires_at && now >= auth.expires_at - 300 && auth.refresh_token) {
        try {
          const r = await fetch(`${API}/api/auth/refresh`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refresh_token: auth.refresh_token }),
          });
          if (r.ok) { const d = await r.json(); auth = { ...auth, ...d }; saveAuth(auth); }
        } catch {}
      }
      return auth.access_token;
    }

    // ---- data ----
    async function fetchAthlete() {
      const token = await getToken();
      if (!token) throw new Error("no_token");
      const r = await fetch(`${API}/api/strava/athlete`, { headers: { Authorization: `Bearer ${token}` } });
      if (r.status === 401) { clearAuth(); throw new Error("unauthorized"); }
      if (!r.ok) throw new Error("fetch_failed");
      return r.json();
    }

    // ---- state + views ----
    const app = document.getElementById("app");
    const state = { view: "garage", bikeId: null, athlete: null, bikes: null, error: null, loading: false };
    const km = (m) => Math.round((m || 0) / 1000).toLocaleString();

    function renderLogin(error) {
      app.innerHTML = `<div class="login">
        <div class="emoji">🚲</div>
        <h1><span>Velo</span>Garage</h1>
        <div class="tag">Track your bikes. Know when to wrench.</div>
        ${error ? `<div class="err">Login failed: ${error}. Please try again.</div>` : ""}
        <a class="btn-strava" href="${API}/api/auth/login">Connect with Strava</a>
        <div class="fine">VeloGarage reads your ride data to calculate component wear. It never posts or modifies your Strava activities.</div>
      </div>`;
    }

    function topbar() {
      const a = state.athlete || {};
      const photo = a.profile_medium && a.profile_medium !== "None"
        ? `<img class="avatar" src="${a.profile_medium}" id="ava" alt="" />`
        : `<div class="avatar" id="ava" style="display:grid;place-items:center;font-size:13px;font-weight:800;">${(a.firstname || "?")[0]}</div>`;
      return `<div class="topbar">
        <div class="brand">🚲 <span>Velo</span>Garage</div>
        <div class="top-right">
          <div class="sync" id="sync"><span class="dot"></span><span id="syncText">Sync</span></div>
          ${photo}
        </div>
      </div>`;
    }

    function renderGarage() {
      let body;
      if (state.loading) {
        body = `<div class="state"><div class="spinner"></div>Loading your garage…<br/><span style="font-size:12px;color:#555">(first load can take ~30s while the server wakes up)</span></div>`;
      } else if (state.error) {
        body = `<div class="state">Couldn't load your bikes (${state.error}).<br/><button class="btn-ghost" id="retry">Try again</button></div>`;
      } else if (!state.bikes || state.bikes.length === 0) {
        body = `<div class="state">No bikes found on your Strava account.<br/>Add a bike in Strava (Settings → My Gear), then sync.<br/><button class="btn-ghost" id="retry">Refresh</button></div>`;
      } else {
        body = `<div class="screen-label">My Garage · ${state.bikes.length} ${state.bikes.length === 1 ? "bike" : "bikes"}</div>` +
          state.bikes.map(b => `<div class="bike-card" data-bike="${b.id}">
            <div class="bike-emoji">🚲</div>
            <div class="bike-info">
              <div class="bike-name">${b.name || "Bike"}</div>
              <div class="bike-dist">${km(b.distance)} km total</div>
            </div>
            ${b.primary ? `<span class="badge">Primary</span>` : ""}
            <span class="chev">›</span>
          </div>`).join("");
      }
      app.innerHTML = topbar() + `<div class="screen">${body}</div>`;
      wireShell();
    }

    function renderBike() {
      const b = (state.bikes || []).find(x => String(x.id) === String(state.bikeId));
      if (!b) { state.view = "garage"; return renderGarage(); }
      app.innerHTML = topbar() + `<div class="screen">
        <div class="detail-head">
          <div class="back" id="back">‹</div>
          <div><div class="detail-name">${b.name || "Bike"}</div><div class="detail-dist">${km(b.distance)} km total</div></div>
        </div>
        <div class="card">
          <div class="soon"><b>Component tracking is next.</b><br/>Here you'll add this bike's components — chain, cassette, tires, brake pads, rotors — and VeloGarage will track wear from its ${km(b.distance)} km, telling you what's due. (Phase 3, saved to your Upstash database.)</div>
        </div>
      </div>`;
      wireShell();
    }

    function render() {
      if (!loadAuth()) return renderLogin();
      if (state.view === "bike") renderBike(); else renderGarage();
    }

    function wireShell() {
      const sync = document.getElementById("sync");
      if (sync) sync.onclick = () => loadGarage(true);
      const ava = document.getElementById("ava");
      if (ava) ava.onclick = () => { if (confirm("Disconnect from Strava?")) { clearAuth(); location.hash = ""; render(); } };
      const retry = document.getElementById("retry");
      if (retry) retry.onclick = () => loadGarage(true);
      document.querySelectorAll("[data-bike]").forEach(el => el.onclick = () => { state.bikeId = el.dataset.bike; state.view = "bike"; renderBike(); });
      const back = document.getElementById("back");
      if (back) back.onclick = () => { state.view = "garage"; renderGarage(); };
    }

    async function loadGarage(spin) {
      state.loading = !state.bikes; state.error = null;
      if (spin) { const s = document.getElementById("sync"); if (s) { s.classList.add("spin"); document.getElementById("syncText").textContent = "Syncing…"; } }
      render();
      try {
        const a = await fetchAthlete();
        state.athlete = a;
        state.bikes = (a.bikes || []).slice().sort((x, y) => (y.primary - x.primary) || (y.distance - x.distance));
        state.error = null;
      } catch (e) {
        if (e.message === "unauthorized" || e.message === "no_token") { render(); return; }
        state.error = e.message;
      } finally {
        state.loading = false;
        if (state.view === "garage") renderGarage(); else renderBike();
        const s = document.getElementById("sync");
        if (s) { s.classList.remove("spin"); document.getElementById("syncText").textContent = "Synced"; }
      }
    }

    // ---- boot ----
    const hashAuth = fromHash();
    if (hashAuth && !hashAuth.error) { saveAuth(hashAuth); history.replaceState(null, "", location.pathname + location.search); }
    if (loadAuth()) { render(); loadGarage(false); }
    else renderLogin(hashAuth && hashAuth.error);
  </script>
</body>
</html>
