name: VeloGarage API

on:
  pull_request:
    branches:
      - main
    paths:
      - api/**
  push:
    branches:
      - main
    paths:
      - api/**
  workflow_dispatch:

permissions:
  contents: read

# Deployment is handled by Railway's native GitHub integration, which
# auto-deploys api/ on every push to main (root directory set to "api").
# Strava/runtime env vars (STRAVA_CLIENT_ID, STRAVA_CLIENT_SECRET,
# API_PUBLIC_URL) are configured in the Railway dashboard, not here.
jobs:
  test-api:
    name: Lint & validate API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check app starts (import only)
        # Validates FastAPI routes load without needing real secrets
        env:
          STRAVA_CLIENT_ID: "0"
          STRAVA_CLIENT_SECRET: "placeholder"
          API_PUBLIC_URL: "http://localhost:8000"
        run: python -c "import main; print('API imports OK')"
