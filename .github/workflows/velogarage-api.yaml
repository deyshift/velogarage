name: VeloGarage API

on:
  pull_request:
    branches:
      - main
    paths:
      - api/**
  push:
    branches:
      - main
    paths:
      - api/**
  workflow_dispatch:

permissions:
  contents: read

# Deployment is handled by Render's native GitHub integration, which
# auto-deploys api/ on every push to main (root directory set to "api").
# Strava/runtime env vars (STRAVA_CLIENT_ID, STRAVA_CLIENT_SECRET,
# API_PUBLIC_URL) are configured in the Render dashboard, not here.
jobs:
  test-api:
    name: Install deps & run pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest
