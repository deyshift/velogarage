name: VeloGarage Web

on:
  pull_request:
    branches:
      - main
    paths:
      - web/**
  push:
    branches:
      - main
    paths:
      - web/**
  workflow_dispatch:

permissions:
  contents: read

# The built output is committed to docs/app/ (served by GitHub Pages). This job
# just verifies the web app type-checks and builds, so a broken change can't be
# merged. Run `npm run build` in web/ locally to regenerate docs/app/.
jobs:
  build-web:
    name: Type-check & build web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
